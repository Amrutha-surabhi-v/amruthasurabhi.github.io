<!-- ── ADD THIS TO YOUR NAV LINKS ── -->
<li><a href="#" onclick="showPage('blog');return false;">Blog</a></li>


<!-- ── BLOG PAGE (add as a sibling to your other sections, wrapped in a page div) ── -->
<div id="page-blog" class="page" style="padding-top:5rem;">

  <!-- BLOG LIST VIEW -->
  <div id="blog-list">
    <div class="section">
      <div class="reveal">
        <p class="s-label">Blog</p>
        <h2 class="s-title">Thoughts on <em>tech, research</em><br>&amp; everything in between</h2>
        <div class="divbar"></div>
      </div>

      <!-- TAG FILTER -->
      <div id="tag-filters" class="reveal" style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2.5rem;"></div>

      <!-- POST GRID -->
      <div id="posts-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:rgba(255,255,255,0.05);">
        <div style="grid-column:1/-1;padding:3rem;text-align:center;color:var(--muted2);font-size:.85rem;letter-spacing:1px;">
          Loading posts...
        </div>
      </div>
    </div>
  </div>

  <!-- SINGLE POST VIEW -->
  <div id="blog-post" style="display:none;">
    <div class="section" style="max-width:720px;">
      <button onclick="closePo()" style="background:none;border:1px solid rgba(255,255,255,0.1);color:var(--silver);padding:.5rem 1.2rem;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:3rem;transition:all .3s;" onmouseover="this.style.borderColor='var(--violet)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.1)'">← Back to Blog</button>
      <div id="post-cover" style="width:100%;max-height:380px;overflow:hidden;margin-bottom:2.5rem;display:none;">
        <img id="post-cover-img" src="" alt="" style="width:100%;height:380px;object-fit:cover;"/>
      </div>
      <div id="post-tags" style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;"></div>
      <h1 id="post-title" style="font-size:clamp(1.8rem,4vw,3rem);font-weight:900;line-height:1.1;letter-spacing:-1px;margin-bottom:.8rem;"></h1>
      <p id="post-date" style="font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid rgba(255,255,255,0.06);"></p>
      <div id="post-body" class="post-body"></div>
    </div>
  </div>
</div>


<!-- ── POST BODY STYLES ── -->
<style>
.post-body{color:var(--muted2);font-size:.97rem;line-height:2;}
.post-body p{margin-bottom:1.4rem;}
.post-body h1,.post-body h2,.post-body h3{color:var(--white);font-weight:700;margin:2rem 0 .8rem;letter-spacing:-.5px;}
.post-body h1{font-size:1.8rem;}
.post-body h2{font-size:1.4rem;}
.post-body h3{font-size:1.1rem;color:var(--violet2);}
.post-body blockquote{border-left:2px solid var(--violet);padding-left:1.2rem;color:var(--silver);font-style:italic;margin:1.5rem 0;}
.post-body code{background:rgba(124,111,255,0.12);color:var(--violet2);padding:.15rem .45rem;font-size:.85em;font-family:monospace;}
.post-body img{width:100%;border-radius:4px;margin:1.5rem 0;}
.post-body hr{border:none;border-top:1px solid rgba(255,255,255,0.06);margin:2rem 0;}
.post-body li{margin-left:1.5rem;margin-bottom:.4rem;}
.post-body strong{color:var(--silver2);}
.post-body em{color:var(--violet2);font-style:italic;}

.post-card{background:var(--black);padding:1.75rem;cursor:pointer;transition:background .3s;position:relative;overflow:hidden;}
.post-card::before{content:'';position:absolute;top:0;left:0;width:0;height:2px;background:var(--violet);transition:width .5s;}
.post-card:hover{background:var(--navy2);}
.post-card:hover::before{width:100%;}
.post-card-cover{width:100%;height:160px;object-fit:cover;margin-bottom:1rem;opacity:.85;}
.post-card-date{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--violet2);margin-bottom:.5rem;}
.post-card-title{font-size:1rem;font-weight:700;color:var(--white);margin-bottom:.6rem;line-height:1.35;}
.post-card-excerpt{font-size:.8rem;color:var(--muted2);line-height:1.75;}
.post-card-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.8rem;}
.post-card-tag{font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--violet2);border:1px solid rgba(124,111,255,0.3);padding:.18rem .55rem;}

.filter-tag{font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--silver);border:1px solid rgba(255,255,255,0.1);padding:.3rem .8rem;cursor:pointer;background:none;transition:all .3s;}
.filter-tag:hover,.filter-tag.active{color:var(--white);border-color:var(--violet);background:var(--vdim);}
</style>


<!-- ── BLOG JAVASCRIPT ── -->
<script>
// Replace this with your actual GitHub username and repo name
const GITHUB_USER = 'Amrutha-surabhi-v';
const GITHUB_REPO = 'amruthasurabhi.github.io';

let allPosts = [];
let activeTag = 'All';

// Page switcher
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  if (name === 'portfolio') {
    document.getElementById('page-portfolio').classList.add('active');
  } else if (name === 'blog') {
    document.getElementById('page-blog').classList.add('active');
    loadPosts();
  }
}

async function loadPosts() {
  const grid = document.getElementById('posts-grid');
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/posts/index.json`);
    if (!res.ok) throw new Error('not found');
    allPosts = await res.json();
    renderFilters();
    renderGrid(allPosts);
  } catch {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:3rem;text-align:center;color:var(--muted2);font-size:.85rem;line-height:2;">
      No posts yet — or the GitHub repo isn't connected.<br>
      <span style="color:var(--violet2);">Follow the setup guide to start publishing from Notion.</span>
    </div>`;
  }
}

function renderFilters() {
  const tags = ['All', ...new Set(allPosts.flatMap(p => p.tags))];
  const el = document.getElementById('tag-filters');
  el.innerHTML = tags.map(t =>
    `<button class="filter-tag${t===activeTag?' active':''}" onclick="filterBy('${t}')">${t}</button>`
  ).join('');
}

function filterBy(tag) {
  activeTag = tag;
  renderFilters();
  renderGrid(tag === 'All' ? allPosts : allPosts.filter(p => p.tags.includes(tag)));
}

function renderGrid(posts) {
  const grid = document.getElementById('posts-grid');
  if (!posts.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:3rem;text-align:center;color:var(--muted2);">No posts in this category yet.</div>`;
    return;
  }
  grid.innerHTML = posts.map((p, i) => {
    const excerpt = p.content.replace(/<[^>]+>/g, '').slice(0, 120) + '…';
    const date = p.date ? new Date(p.date).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'}) : '';
    return `<div class="post-card" onclick="openPost(${i})">
      ${p.cover ? `<img class="post-card-cover" src="${p.cover}" alt="${p.title}"/>` : ''}
      <div class="post-card-date">${date}</div>
      <div class="post-card-title">${p.title}</div>
      <div class="post-card-excerpt">${excerpt}</div>
      <div class="post-card-tags">${p.tags.map(t=>`<span class="post-card-tag">${t}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function openPost(idx) {
  const p = activeTag === 'All' ? allPosts[idx] : allPosts.filter(x => x.tags.includes(activeTag))[idx];
  document.getElementById('blog-list').style.display = 'none';
  document.getElementById('blog-post').style.display = 'block';
  document.getElementById('post-title').textContent = p.title;
  document.getElementById('post-date').textContent = p.date
    ? new Date(p.date).toLocaleDateString('en-IN', {weekday:'long',day:'numeric',month:'long',year:'numeric'})
    : '';
  document.getElementById('post-body').innerHTML = p.content;
  document.getElementById('post-tags').innerHTML = p.tags.map(t=>`<span class="post-card-tag">${t}</span>`).join('');
  if (p.cover) {
    document.getElementById('post-cover').style.display = 'block';
    document.getElementById('post-cover-img').src = p.cover;
  } else {
    document.getElementById('post-cover').style.display = 'none';
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function closePo() {
  document.getElementById('blog-list').style.display = 'block';
  document.getElementById('blog-post').style.display = 'none';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
