name: Sync Notion Blog Posts

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Notion SDK
        run: npm install @notionhq/client

      - name: Fetch posts from Notion and save as JSON
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node -e "
          const { Client } = require('@notionhq/client');
          const fs = require('fs');

          const notion = new Client({ auth: process.env.NOTION_TOKEN });

          async function fetchPosts() {
            const db = await notion.databases.query({
              database_id: process.env.NOTION_DATABASE_ID,
              sorts: [{ property: 'date', direction: 'descending' }]
            });

            const posts = await Promise.all(db.results.map(async (page) => {
              const blocks = await notion.blocks.children.list({ block_id: page.id });

              const content = blocks.results.map(b => {
                const type = b.type;
                const getText = (arr) => (arr || []).map(t => {
                  let s = t.plain_text;
                  if (t.annotations.bold) s = '<strong>' + s + '</strong>';
                  if (t.annotations.italic) s = '<em>' + s + '</em>';
                  if (t.annotations.code) s = '<code>' + s + '</code>';
                  return s;
                }).join('');

                if (type === 'paragraph') return '<p>' + getText(b.paragraph.rich_text) + '</p>';
                if (type === 'heading_1') return '<h1>' + getText(b.heading_1.rich_text) + '</h1>';
                if (type === 'heading_2') return '<h2>' + getText(b.heading_2.rich_text) + '</h2>';
                if (type === 'heading_3') return '<h3>' + getText(b.heading_3.rich_text) + '</h3>';
                if (type === 'bulleted_list_item') return '<li>' + getText(b.bulleted_list_item.rich_text) + '</li>';
                if (type === 'numbered_list_item') return '<li>' + getText(b.numbered_list_item.rich_text) + '</li>';
                if (type === 'quote') return '<blockquote>' + getText(b.quote.rich_text) + '</blockquote>';
                if (type === 'image') {
                  const url = b.image.type === 'external' ? b.image.external.url : b.image.file.url;
                  return '<img src=\"' + url + '\" alt=\"\" />';
                }
                if (type === 'divider') return '<hr/>';
                return '';
              }).join('');

              const props = page.properties;
              return {
                id: page.id,
                title: props.title?.title?.[0]?.plain_text || props.Title?.title?.[0]?.plain_text || 'Untitled',
                date: props.date?.date?.start || props.Date?.date?.start || '',
                tags: props.tags?.multi_select?.map(t => t.name) || props.Tags?.multi_select?.map(t => t.name) || [],
                cover: page.cover?.external?.url || page.cover?.file?.url || '',
                content
              };
            }));

            fs.mkdirSync('posts', { recursive: true });
            fs.writeFileSync('posts/index.json', JSON.stringify(posts, null, 2));
            console.log('Written to posts/index.json');
            console.log('Synced ' + posts.length + ' posts.');
          }

          fetchPosts().catch(err => { console.error(err); process.exit(1); });
          "

      - name: Commit and push posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ls -la posts/ || echo "posts folder missing"
          git status
          git add -f posts/index.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync notion posts $(date -u '+%Y-%m-%d %H:%M')"
          git push
